<section class="section" id="genome-food">
  <div class="container">
    <div class="story">
      <div class="story__content">
        <span class="label">01 — 基因组 × 食物</span>
        <h2 class="heading-lg">解读基因组与食物的<em>接口</em></h2>
        <p class="text-base">
          我们不再把营养仅视为热力学方程：卡路里输入，能量输出。食物是一套复杂的生物编码。营养基因组学研究基因组与营养环境如何相互塑造。
        </p>
        <p class="text-base">
          你每天摄入的生物活性分子充当化学信号，直接影响基因表达、甲基化模式，并调控与健康寿命相关的通路。
        </p>
      </div>
      <div class="story__media">
